<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>Folio | Loading...</title>
<link id="favicon" rel="icon" type="image/webp" href="">

<style>
  /* ==========================================================================
     BASE CSS & DYNAMIC TOKENS
     ========================================================================== */
  :root {
    --fl-bg: #ffffff;
    --fl-text: #000000;
    --fl-gutter: 4px; 
    --fl-margin: 4px;
    --fl-nav-h: 60px;
    --fl-nav-h-m: 35px;
    --fl-ease: cubic-bezier(0.23, 1, 0.32, 1);
    --fl-reveal-dist: 20px;
    --fl-reveal-dur: 0.8s;
    --fl-font-fallback: "Arial", "Helvetica", sans-serif;
    
    /* Skeleton Colors */
    --fl-skeleton-bg: #f2f2f2;
    --fl-skeleton-highlight: #e6e6e6;
  }

  @media (prefers-color-scheme: dark) {
    :root { 
      --fl-bg: #000000; 
      --fl-text: #ffffff; 
      --fl-skeleton-bg: #1a1a1a;
      --fl-skeleton-highlight: #262626;
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    scrollbar-width: none;
    -ms-overflow-style: none;
    user-select: none;
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

  body { 
    margin: 0; padding: 0; 
    font-family: var(--fl-font-fallback);
    background: var(--fl-bg); 
    color: var(--fl-text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden; min-height: 100vh; 
    line-height: 1.4;
  }

  .fl-grid {
    display: grid; 
    grid-template-columns: repeat(12, 1fr);
    gap: var(--fl-gutter); 
    margin: var(--fl-margin);
    padding: 80px 0 120px;
  }

  /* ==========================================================================
     COMPONENT: LOGO GIF OVERLAY
     ========================================================================== */
  .fl-logo__gif-wrap {
    position: fixed;
    top: 0;
    left: 4px;
    height: var(--fl-nav-h);
    display: flex;
    align-items: center;
    z-index: 1001; 
    pointer-events: auto;
    mix-blend-mode: normal; 
  }

  .fl-logo__gif { 
    height: 48px; 
    width: auto; 
    display: block; 
    cursor: pointer;
    transition: opacity 0.3s var(--fl-ease);
  }

  .fl-logo__gif:hover {
    opacity: 0.7;
  }

  /* ==========================================================================
     COMPONENT: HEADER
     ========================================================================== */
  .fl-header {
    position: fixed; width: 100%; z-index: 999;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px; height: var(--fl-nav-h); top: 0;
    mix-blend-mode: difference; 
  }

  .fl-logo { height: 100%; display: flex; align-items: center; text-decoration: none; color: inherit; }
  
  .fl-logo__text {
    font-family: var(--header-font);
    font-size: var(--header-fs);
    font-weight: var(--header-fw);
    color: #fff; 
    letter-spacing: -0.05em;
    text-decoration: none;
    transition: opacity 0.3s;
    display: none; 
  }

  .fl-nav { display: flex; gap: 40px; }
  .fl-nav__link {
    font-family: var(--header-font);
    font-size: var(--header-fs);
    font-weight: var(--header-fw);
    color: #fff;
    text-decoration: none;
    transition: opacity 0.3s;
  }
  .fl-nav__link:hover { opacity: 0.3; }

  @media (max-width: 768px) {
    .fl-grid { padding: 4px 0 120px; }
    .fl-logo__gif-wrap { top: auto; bottom: 12px; left: 28px; height: var(--fl-nav-h-m); mix-blend-mode: normal; }
    .fl-logo__gif { height: 18px; }
    .fl-header {
      top: auto; bottom: 12px; left: 12px;
      width: calc(100% - 24px); height: var(--fl-nav-h-m);
      padding: 0 16px; border-radius: 12px; 
      mix-blend-mode: normal; 
      background: rgba(255, 255, 255, 0.75); 
      backdrop-filter: blur(20px) saturate(180%); 
      border: 0.5px solid rgba(0,0,0,0.08);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      .fl-header { background: rgba(28, 28, 30, 0.85); border: 0.5px solid rgba(255,255,255,0.1); }
    }
    .fl-logo__text, .fl-nav__link { font-size: var(--header-fs-m); color: var(--fl-text); } 
  }

  /* ==========================================================================
     COMPONENT: CDN MEDIA RENDERER
     ========================================================================== */
  .fl-cdn-container {
    position: relative; width: 100%; overflow: hidden;
    background-color: var(--fl-skeleton-bg); 
    border-radius: 0; 
    display: flex; align-items: center; justify-content: center;
  }
  .fl-cdn-container::after {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--fl-skeleton-highlight), transparent);
    transform: translateX(-100%); animation: skeleton-wave 1.5s infinite; z-index: 1;
  }
  .fl-cdn-container.is-loaded::after { display: none; }
  @keyframes skeleton-wave { 100% { transform: translateX(100%); } }

  .fl-cdn-guard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: default; background: transparent; }
  .fl-cdn-media { width: 100%; height: 100%; display: block; object-fit: cover; opacity: 0; transition: opacity 0.5s var(--fl-ease); }
  .is-loaded .fl-cdn-media { opacity: 1; }

  .fl-cdn-iframe-wrap { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
  .fl-cdn-iframe-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

  /* ==========================================================================
     INFO & GALLERY
     ========================================================================= */
  .fl-info { margin-bottom: 20px; font-family: var(--info-font); font-size: var(--info-fs); font-weight: var(--info-fw); color: var(--info-color); opacity: 0.8; }
  .fl-info__title { display: block; margin-bottom: 4.2em; font-weight: normal; }
  .fl-item-wrapper { position: relative; display: flex; flex-direction: column; }
  .type-item { font-family: var(--gallery-font); font-size: var(--gallery-fs); font-weight: var(--gallery-fw); color: var(--gallery-color); }
  .fl-archive-wrapper { grid-column: span 12; margin-top: 40px; }
  .type-archive { font-family: var(--info-font); font-size: 10px; font-weight: 600; text-decoration: none; color: var(--fl-text); }
  .fl-reveal { opacity: 0; transform: translateY(var(--fl-reveal-dist)); transition: opacity var(--fl-reveal-dur) var(--fl-ease), transform var(--fl-reveal-dur) var(--fl-ease); }
  .fl-reveal.is-visible { opacity: 1; transform: translateY(0); }

  @media (min-width: 769px) {
    .type-item-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; mix-blend-mode: difference; z-index: 20; pointer-events: none; }
    .type-item { color: #fff; opacity: 0; transform: translateY(5px); }
    .fl-item-wrapper:hover .type-item { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <div class="fl-logo__gif-wrap">
    <img class="fl-logo__gif" id="ui-gif" alt="Logo" draggable="false">
  </div>

  <header class="fl-header" id="ui-header">
    <a href="https://fo.neuepoor.com" class="fl-logo" id="ui-logo">
      <span class="fl-logo__text" id="ui-logo-text"></span>
    </a>
    <nav class="fl-nav" id="ui-nav"></nav>
  </header>

  <main class="fl-grid" id="ui-main-grid"></main>

  <script>
    /**
     * CONFIG v4.4 - 回退版本，移除 AI，保留 Logo 交互修复
     */
    const CONFIG = {
      version: "4.4",
      seo: {
        title: "Folio | Design System v4.4",
        favicon: "https://folio.neuepoor.com/Favicon.webp"
      },
      typography: {
        header: { font: "Arial, sans-serif", weight: "700", sizePC: "32px", sizeMobile: "21px", color: "#ffffff" },
        info: { font: "Arial, sans-serif", weight: "400", sizePC: "10px", sizeMobile: "10px", color: "inherit" },
        gallery: { font: "Arial, sans-serif", weight: "400", sizePC: "10px", sizeMobile: "10px", color: "inherit" }
      },
      header: {
        logo: { gif: "https://folio.neuepoor.com/logo.gif", text: "Foo", link: "https://fo.neuepoor.com" },
        nav: [
          { name: 'Works', link: 'https://works.neuepoor.com' },
          { name: '(Play)', link: 'https://play.neuepoor.com' },
          { name: 'Me', link: 'https://me.neuepoor.com' }
        ]
      },
      info: [
        { title: "Works", content: "Branding<br>Vision identity<br>Look Book<br>Interface<br>Packaging<br>Editorial<br>Apparel", span: 6 },
        { title: "Service", content: "Creative Direction<br>Art Direction<br>Graphic<br>Illustration<br>Motion<br>Typeface", span: 4 },
        { title: "Contacts", content: "Email<br>Instagram<br>Github<br>小红书<br>Wechat", span: 2 }
      ],
      gallery: {
        placeholder: "https://via.placeholder.com/1200x800?text=Asset+Unavailable",
        items: [
          { id: "02001", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" },
          { id: "02002", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" },
          { id: "02003", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" },
          { id: "02004", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" },
          { id: "02005", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" },
          { id: "02006", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" },
          { id: "02007", span: 12, ratio: "auto", type: "image", src: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png", url: "#" }
        ]
      }
    };

    /**
     * CDN COMPONENT
     */
    const CDN = {
      getMediaType(item) {
        if (item.type) return item.type;
        const ext = item.src.split('.').pop().toLowerCase();
        if (['mp4', 'webm', 'mov'].includes(ext)) return 'video';
        if (item.src.includes('youtube') || item.src.includes('embed')) return 'embed';
        return 'image';
      },
      render(item) {
        const type = this.getMediaType(item);
        const ratioStyle = item.ratio && item.ratio !== "auto" ? `aspect-ratio: ${item.ratio};` : "";
        let mediaHtml = '';
        switch (type) {
          case 'video':
            mediaHtml = `<video class="fl-cdn-media" src="${item.src}" muted loop playsinline autoplay preload="metadata" oncanplay="this.parentElement.classList.add('is-loaded')"></video>`;
            break;
          case 'embed':
            mediaHtml = `<div class="fl-cdn-iframe-wrap"><iframe src="${item.src}" allow="autoplay; fullscreen" loading="lazy"></iframe></div>`;
            break;
          default:
            mediaHtml = `<img class="fl-cdn-media" src="${item.src}" alt="${item.id}" loading="lazy" decoding="async" draggable="false" onload="this.parentElement.classList.add('is-loaded')" onerror="this.src='${CONFIG.gallery.placeholder}'">`;
        }
        return `<div class="fl-cdn-container" style="${ratioStyle}">${mediaHtml}<div class="fl-cdn-guard" oncontextmenu="return false;"></div></div>`;
      }
    };

    const ENGINE = {
      applySeo() {
        if (CONFIG.seo) {
          document.title = CONFIG.seo.title;
          const fav = document.getElementById('favicon');
          if (fav && CONFIG.seo.favicon) fav.href = CONFIG.seo.favicon;
        }
      },
      applyTypography() {
        const root = document.documentElement;
        const t = CONFIG.typography;
        const props = {
          '--header-font': t.header.font, '--header-fw': t.header.weight, '--header-fs': t.header.sizePC, '--header-fs-m': t.header.sizeMobile,
          '--info-font': t.info.font, '--info-fw': t.info.weight, '--info-fs': t.info.sizePC, '--info-color': t.info.color,
          '--gallery-font': t.gallery.font, '--gallery-fw': t.gallery.weight, '--gallery-fs': t.gallery.sizePC, '--gallery-fs-m': t.gallery.sizeMobile, '--gallery-color': t.gallery.color
        };
        Object.entries(props).forEach(([k, v]) => root.style.setProperty(k, v));
      },
      renderHeader() {
        const gif = document.getElementById('ui-gif');
        const text = document.getElementById('ui-logo-text');
        const nav = document.getElementById('ui-nav');

        gif.src = CONFIG.header.logo.gif;
        text.innerText = CONFIG.header.logo.text;

        // Logo GIF 点击跳转
        gif.onclick = () => {
          window.location.href = CONFIG.header.logo.link;
        };

        gif.onload = () => { text.style.display = 'none'; };
        gif.onerror = () => { gif.style.display = 'none'; text.style.display = 'block'; };

        nav.innerHTML = CONFIG.header.nav.map(n => `<a href="${n.link}" class="fl-nav__link">${n.name}</a>`).join('');
      },
      buildContent() {
        const grid = document.getElementById('ui-main-grid');
        const infoHTML = CONFIG.info.map(sec => `<div class="fl-info fl-reveal" style="grid-column: span ${sec.span}"><b class="fl-info__title">${sec.title}</b>${sec.content}</div>`).join('');
        const galleryHTML = CONFIG.gallery.items.map((item) => `<div class="fl-item-wrapper fl-reveal" style="grid-column: span ${item.span || 12}"><div class="type-item-container"><span class="type-item">${item.id}</span></div>${CDN.render(item)}</div>`).join('');
        grid.innerHTML = infoHTML + galleryHTML + `<div class="fl-archive-wrapper fl-reveal"><a href="/Archive/index.html" class="type-archive">Archive</a></div>`;
        this.initReveal();
        this.applyAntiTheft();
      },
      applyAntiTheft() {
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.querySelectorAll('img').forEach(img => img.setAttribute('draggable', 'false'));
      },
      initReveal() {
        const obs = new IntersectionObserver((es) => {
          es.forEach(e => { if(e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }});
        }, { threshold: 0.1 });
        document.querySelectorAll('.fl-reveal').forEach(el => obs.observe(el));
      },
      start() {
        this.applySeo();
        this.applyTypography();
        this.renderHeader();
        this.buildContent();
      }
    };

    window.onload = () => ENGINE.start();
  </script>
</body>
</html>
